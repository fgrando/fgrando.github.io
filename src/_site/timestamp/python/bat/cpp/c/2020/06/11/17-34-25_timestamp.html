  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">Getting timestamp</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="2020-06-11T17:34:25-03:00" itemprop="datePublished">Jun 11, 2020
      </time>• <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">fgrando</span></span></p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    
<p>Getting timestamp in <code class="language-plaintext highlighter-rouge">python</code>:</p>

<figure class="highlight"><pre><code class="language-python" data-lang="python"><span class="kn">import</span> <span class="nn">datetime</span>

<span class="n">now</span> <span class="o">=</span> <span class="n">datetime</span><span class="p">.</span><span class="n">datetime</span><span class="p">.</span><span class="n">now</span><span class="p">()</span>
<span class="n">timestamp</span> <span class="o">=</span> <span class="n">now</span><span class="p">.</span><span class="n">strftime</span><span class="p">(</span><span class="s">'%Y-%m-%d_%H:%M:%S'</span><span class="p">.</span><span class="nb">format</span><span class="p">(</span><span class="n">now</span><span class="p">))</span>
<span class="k">print</span> <span class="p">(</span><span class="n">timestamp</span><span class="p">)</span></code></pre></figure>

<p>Getting timestamp in <code class="language-plaintext highlighter-rouge">batch</code>:</p>

<figure class="highlight"><pre><code class="language-batch" data-lang="batch">@echo <span class="na">off</span>
<span class="kd">SETLOCAL</span>
<span class="kd">CALL</span> <span class="nl">:GetTimestamp</span> <span class="nb">now</span>
<span class="nb">echo</span> <span class="kd">timestamp</span> <span class="o">=</span> <span class="nv">%now%</span>
<span class="kd">EXIT</span> <span class="na">/b </span><span class="nv">%ERRORLEVEL%</span>

<span class="nl">:GetTimestamp</span>
<span class="kd">FOR</span> <span class="na">/F </span><span class="vm">%%A</span> <span class="kd">IN</span> <span class="o">(</span><span class="s1">'WMIC OS GET LocalDateTime </span><span class="se">^|</span><span class="s1"> FINDSTR \.'</span><span class="o">)</span> <span class="kd">DO</span> @SET <span class="kd">B</span><span class="o">=</span><span class="vm">%%A</span>
<span class="kd">SET</span> <span class="kd">y</span><span class="o">=</span><span class="vm">%B</span>:<span class="o">~</span><span class="m">0</span><span class="o">,</span><span class="m">4</span><span class="err">%</span>
<span class="kd">SET</span> <span class="kd">mo</span><span class="o">=</span><span class="vm">%B</span>:<span class="o">~</span><span class="m">4</span><span class="o">,</span><span class="m">2</span><span class="err">%</span>
<span class="kd">SET</span> <span class="kd">d</span><span class="o">=</span><span class="vm">%B</span>:<span class="o">~</span><span class="m">6</span><span class="o">,</span><span class="m">2</span><span class="err">%</span>
<span class="kd">SET</span> <span class="kd">h</span><span class="o">=</span><span class="vm">%B</span>:<span class="o">~</span><span class="m">8</span><span class="o">,</span><span class="m">2</span><span class="err">%</span>
<span class="kd">SET</span> <span class="kd">m</span><span class="o">=</span><span class="vm">%B</span>:<span class="o">~</span><span class="m">10</span><span class="o">,</span><span class="m">2</span><span class="err">%</span>
<span class="kd">SET</span> <span class="kd">s</span><span class="o">=</span><span class="vm">%B</span>:<span class="o">~</span><span class="m">12</span><span class="o">,</span><span class="m">2</span><span class="err">%</span>
<span class="kd">SET</span> <span class="kd">timestamp</span><span class="o">=</span><span class="nv">%d%</span><span class="o">-</span><span class="nv">%mo%</span><span class="o">-</span><span class="nv">%y%</span> <span class="nv">%h%</span>:<span class="nv">%m%</span>:<span class="nv">%s%</span>
<span class="kd">SET</span> <span class="s2">"</span><span class="err">%</span><span class="s2">~1=</span><span class="nv">%d%</span><span class="s2">-</span><span class="nv">%timestamp%</span><span class="s2">"</span>
<span class="kd">EXIT</span> <span class="na">/B </span><span class="m">0</span></code></pre></figure>
